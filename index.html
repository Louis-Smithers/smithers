    <!-- JSON-LD: FAQPage — keep in sync with FAQ array in src/App.tsx -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "What does Smithers actually do?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Smithers is a Canadian operations and automation consultancy for small businesses. We come in when your tools have outgrown the way you set them up — tangled CRMs, sprawling spreadsheets, half-built Zapier flows, manual reports — and we replace them with systems that quietly do the work. Engagements range from one-off fixes to multi-week builds to ongoing advisory."
            }
          },
          {
            "@type": "Question",
            "name": "Where is Smithers based and who do you work with?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Smithers is based in Montreal, Quebec, and works remotely with small businesses across Canada. Our typical client is a 5 to 50 person company, often founder-led, somewhere between 'we made it work' and 'we can't keep doing it this way.' We work most often in professional services, e-commerce, healthcare, real estate, and trades."
            }
          },
          {
            "@type": "Question",
            "name": "How is Smithers different from a regular consulting firm or agency?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Traditional consulting firms write slide decks and leave. Agencies build something and bill you forever to maintain it. Smithers is a small senior team that scopes tight engagements, ships working systems, documents them, and trains your team to own what we build. We're paid to make ourselves unnecessary on each project — not to embed indefinitely."
            }
          },
          {
            "@type": "Question",
            "name": "What tools and platforms do you work with?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "We work fluently with the platforms most small businesses already rely on: CRMs like HubSpot, Salesforce, and Pipedrive; data and ops tools like Airtable, Notion, and Monday; automation platforms like Zapier, Make, and n8n; databases and internal tooling like Supabase and Retool; and commerce and finance tools like Stripe, QuickBooks, and Shopify. We also build custom internal tools when off-the-shelf doesn't fit. For AI work, we ship LLM-powered workflows using the OpenAI and Anthropic APIs."
            }
          },
          {
            "@type": "Question",
            "name": "How much does it cost to work with Smithers?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Requests — small, scoped fixes — are billed hourly or in small fixed-price blocks. Missions are fixed-price projects scoped from a written Mission Overview, typically ranging from $5,000 to $50,000 CAD depending on complexity. Advisory and support retainers start at $2,000 CAD per month. The intro call is free, and you'll always see scope and price in writing before any paid work starts."
            }
          },
          {
            "@type": "Question",
            "name": "How long does a typical Mission take?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Most Missions run between 2 and 8 weeks from kickoff to handoff. Shorter Missions are usually a single automation or tool build; longer ones involve rebuilding a CRM, stitching together multiple systems, or shipping an AI workflow end-to-end. We scope every Mission with a written timeline before you commit, so you know what you're paying for and when it lands."
            }
          },
          {
            "@type": "Question",
            "name": "Do you work with companies outside Canada?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. Smithers is Canadian and serves Canadian small businesses primarily, but we take on US clients case by case when the project is a good fit. All of our work is remote, so geography matters less than time zone overlap and a clear scope."
            }
          },
          {
            "@type": "Question",
            "name": "Will my team be able to maintain what you build after you're gone?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. Every Mission ends with written documentation and a training session for the people on your team who will own the system. We build for handoff, not lock-in — the goal is that your team can extend, debug, and operate what we built without needing to call us back."
            }
          },
          {
            "@type": "Question",
            "name": "Can you help us figure out where AI fits in our business?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes, but only where it earns its keep. We've shipped AI workflows for customer support triage, document extraction, lead qualification, and internal knowledge search. We'll also tell you when AI is the wrong answer and a simpler automation or a better-designed spreadsheet would do the job for a fraction of the cost."
            }
          },
          {
            "@type": "Question",
            "name": "How do I get started?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Book a free 30-minute discovery call. We'll listen to what's broken, ask a few questions, and tell you honestly whether Smithers is the right fit. If it is, we move to a short diagnosis and a written proposal. If it isn't, we'll point you somewhere better. Email e@smithers.app or call 514-806-0510 to set it up."
            }
          }
        ]
      }
